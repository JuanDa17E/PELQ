<div class="admin">
  <div class="admin-header">
    <h2 class="admin-titulo">Clientes registrados</h2>
    <button class="btn-nuevo" (click)="mostrarFormulario = !mostrarFormulario">
      <i class="ti ti-plus"></i> Nuevo cliente
    </button>
  </div>

  <!-- FORMULARIO -->
  <div class="formulario" *ngIf="mostrarFormulario">
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre del local</label>
        <input type="text" [(ngModel)]="nuevoCliente.nombreLocal" placeholder="Ej: Peluquería El Estilo" />
      </div>
      <div class="form-group">
        <label>Nombre del contacto</label>
        <input type="text" [(ngModel)]="nuevoCliente.nombreContacto" placeholder="Ej: Carlos Pérez" />
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" [(ngModel)]="nuevoCliente.telefono" placeholder="Ej: 3001234567" />
      </div>
      <div class="form-group">
        <label>Email del local</label>
        <input type="email" [(ngModel)]="nuevoCliente.emailLocal" placeholder="Ej: local@email.com" />
      </div>
      <div class="form-group">
        <label>URL base de datos</label>
        <input type="text" [(ngModel)]="nuevoCliente.dbUrl" placeholder="jdbc:postgresql://..." />
      </div>
      <div class="form-group">
        <label>Usuario base de datos</label>
        <input type="text" [(ngModel)]="nuevoCliente.dbUsername" placeholder="Ej: postgres.xxxxxxxx" />
      </div>
      <div class="form-group">
        <label>Contraseña base de datos</label>
        <input type="password" [(ngModel)]="nuevoCliente.dbPassword" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Fecha vencimiento</label>
        <input type="date" [(ngModel)]="nuevoCliente.fechaVencimiento" />
      </div>
      <div class="form-group">
        <label>Email admin</label>
        <input type="email" [(ngModel)]="nuevoCliente.emailAdmin" placeholder="admin@local.com" />
      </div>
      <div class="form-group">
        <label>Contraseña admin</label>
        <input type="password" [(ngModel)]="nuevoCliente.passwordAdmin" placeholder="••••••••" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancelar" (click)="mostrarFormulario = false">Cancelar</button>
      <button class="btn-guardar" (click)="registrarCliente()" [disabled]="cargando">
        {{ cargando ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </div>

  <!-- TABLA -->
  <div class="tabla-wrapper">
    <table class="tabla">
      <thead>
        <tr>
          <th>Local</th>
          <th>Contacto</th>
          <th>Email</th>
          <th>Vencimiento</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <td>{{ cliente.nombreLocal }}</td>
          <td>{{ cliente.nombreContacto }}</td>
          <td>{{ cliente.email }}</td>
          <td>{{ cliente.fechaVencimiento | date:'dd/MM/yyyy' }}</td>
          <td>
            <span class="badge" [class.activo]="cliente.activo" [class.inactivo]="!cliente.activo">
              {{ cliente.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
